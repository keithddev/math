<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>🎲 三位數探險 - 超可愛版</title>
<style>
  body { font-family: 'Microsoft JhengHei', sans-serif; background: linear-gradient(135deg, #ff9a9e, #fad0c4); margin:0; padding:20px; }
  .container { max-width: 850px; margin: 0 auto; background: white; border-radius: 25px; padding: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.15); }
  h1 { text-align:center; font-size:2.2em; color:#e91e63; margin:10px 0; }
  .score { font-size:1.8em; text-align:center; color:#4a3; }
  .progress { height:15px; background:#eee; border-radius:20px; margin:20px 0; overflow:hidden; }
  .bar { height:100%; background:linear-gradient(90deg,#4a3,#8bc34a); width:0%; transition:width 0.6s; }
  .question { font-size:1.4em; margin:25px 0; padding:20px; background:#fff9e6; border-radius:20px; border-left:8px solid #ff9800; }
  .visual { text-align:center; font-size:4em; margin:15px 0; }
  button { padding:14px 24px; font-size:1.1em; border:none; border-radius:15px; cursor:pointer; margin:6px; transition:0.3s; }
  .opt { background:#e3f2fd; }
  .opt:hover { transform:scale(1.08); background:#bbdefb; }
  .correct { background:#4caf50 !important; color:white; }
  .wrong { background:#f44336 !important; color:white; }
  .feedback { padding:18px; border-radius:15px; font-size:1.3em; margin:20px 0; animation: pop 0.5s; }
  @keyframes pop { 0%{transform:scale(0.5)} 100%{transform:scale(1)} }
</style>
</head>
<body>
<div class="container">
  <h1>🎲 三位數探險 🐻</h1>
  <p style="text-align:center; font-size:1.2em;">二年級數學冒險 - 答對就獲得小熊星星！</p>
  
  <div class="progress"><div id="progress" class="bar"></div></div>
  <div class="score">目前得分：<span id="score">0</span> / 110</div>
  
  <div id="game"></div>
  
  <div style="text-align:center; margin-top:30px;">
    <button onclick="nextQuestion()" id="nextBtn" style="display:none; background:#e91e63; color:white; padding:18px 40px; font-size:1.3em;">下一題 →</button>
  </div>
</div>

<script>
// 題目 + 視覺元素
const questions = [
  { q: "1. 這裏有數粒________粒。", visual: "🟣🟣🟣🟣🟣🟣🟣🟣🟣🟣", answer: "10" },
  { q: "2. 這裏有數粒________粒。", visual: "🔴🔴🔴🔴🔴🔴🔴", answer: "7" },
  { q: "3. 下面算柱所表示的數是 ________，讀作 ________。", visual: "🧮 百位🟦 十位🟨 個位🟩", answer: "325 三百二十五" },
  { q: "4. 「0」在十位，表示______。", visual: "🧮", answer: "零" },
  { q: "11. 在 626、358 和 804 中，哪一個最大？", visual: "🏆", type:"single", options:["626","358","804"], answer:"804" },
  { q: "12. 在 729、513 和 562 中，哪一個最小？", visual: "🐭", type:"single", options:["729","513","562"], answer:"513" },
  // 可繼續加入更多題目...
];

let currentQ = 0;
let score = 0;

function renderQuestion() {
  const q = questions[currentQ];
  let html = `<div class="question"><strong>${q.q}</strong></div>`;
  html += `<div class="visual">${q.visual || '🔢'}</div>`;

  if (q.type === "single") {
    html += `<div style="text-align:center;">`;
    q.options.forEach(opt => {
      html += `<button class="opt" onclick="checkAnswer('${opt}')">${opt}</button>`;
    });
    html += `</div>`;
  } else {
    html += `<input type="text" id="answerInput" placeholder="輸入答案" style="width:80%; padding:15px; font-size:1.2em; border-radius:12px;">`;
    html += `<br><button onclick="submitInput()" style="margin-top:15px; background:#4a3; color:white;">提交答案</button>`;
  }
  
  document.getElementById("game").innerHTML = html;
  document.getElementById("nextBtn").style.display = "none";
  updateProgress();
}

function submitInput() {
  const input = document.getElementById("answerInput").value.trim();
  const q = questions[currentQ];
  if (input.toLowerCase().includes(q.answer.toLowerCase())) {
    score += 10;
    showFeedback("🎉 答對了！好棒棒！", "correct");
  } else {
    showFeedback(`😅 答案是 ${q.answer}，再加油！`, "wrong");
  }
  document.getElementById("score").textContent = score;
  document.getElementById("nextBtn").style.display = "inline-block";
}

function checkAnswer(selected) {
  const q = questions[currentQ];
  if (selected === q.answer) {
    score += 10;
    showFeedback("🎉 太厲害了！", "correct");
  } else {
    showFeedback(`正確答案是 ${q.answer}`, "wrong");
  }
  document.getElementById("score").textContent = score;
  document.getElementById("nextBtn").style.display = "inline-block";
}

function showFeedback(msg, cls) {
  const fb = document.createElement("div");
  fb.className = `feedback ${cls}`;
  fb.innerHTML = msg;
  document.getElementById("game").appendChild(fb);
}

function nextQuestion() {
  currentQ++;
  if (currentQ >= questions.length) {
    document.getElementById("game").innerHTML = `
      <h2 style="text-align:center;color:#e91e63;">🏆 冒險完成！</h2>
      <p style="text-align:center;font-size:3em;">你的得分：${score} 分</p>
      <button onclick="location.reload()" style="background:#e91e63;color:white;padding:20px 50px;font-size:1.4em;border-radius:20px;">再玩一次 🌟</button>
    `;
    return;
  }
  renderQuestion();
}

function updateProgress() {
  const percent = Math.min(100, ((currentQ + 1) / questions.length) * 100);
  document.getElementById("progress").style.width = percent + "%";
}

renderQuestion();
</script>
</body>
</html>
