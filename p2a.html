<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>三位數探險 - 第二版 2上A 第1課</title>
<style>
  body { font-family: 'Microsoft JhengHei', sans-serif; background: linear-gradient(#a8e6cf, #dcedc1); margin:0; padding:20px; }
  .container { max-width: 900px; margin:auto; background:white; border-radius:25px; padding:30px; box-shadow:0 15px 40px rgba(0,0,0,0.2); }
  h1 { text-align:center; color:#2e7d32; }
  .progress { height:12px; background:#ddd; border-radius:10px; margin:20px 0; }
  .bar { height:100%; background:#4caf50; width:0%; transition:width .5s; }
  .question { background:#f9fbe7; padding:20px; border-radius:18px; margin:25px 0; border-left:6px solid #8bc34a; }
  .visual { text-align:center; font-size:3.5em; margin:15px 0; line-height:1.2; }
  button { padding:12px 22px; margin:5px; border:none; border-radius:12px; font-size:1.1em; cursor:pointer; }
  .opt { background:#e8f5e9; }
  .opt:hover { background:#c8e6c9; }
  .correct { background:#4caf50; color:white; }
  .wrong { background:#f44336; color:white; }
  .feedback { padding:15px; border-radius:12px; margin:15px 0; font-weight:bold; }
</style>
</head>
<body>
<div class="container">
  <h1>🧮 三位數探險 🐼</h1>
  <div class="progress"><div id="progress" class="bar"></div></div>
  <div style="text-align:center; font-size:1.4em;">得分: <span id="score">0</span>/160</div>
  
  <div id="game"></div>
  
  <div style="text-align:center;margin-top:30px;">
    <button id="nextBtn" onclick="nextQuestion()" style="display:none;background:#2e7d32;color:white;padding:15px 40px;font-size:1.2em;">下一題 →</button>
  </div>
</div>

<script>
const questions = [
  {num:1, q:"這裏有數粒________粒。", visual:"🟦🟦🟦🟦🟦🟦🟦🟦🟦🟦<br>🟦🟦🟦🟦🟦🟦🟦🟦🟦🟦", answer:"20", type:"input"},
  {num:2, q:"這裏有數粒________粒。", visual:"📦📦📦📦<br>📦📦📦", answer:"7", type:"input"},
  {num:3, q:"下面算柱所表示的數是 ________，讀作 ________。", visual:"🧮 百:9 十:0 個:7", answer:"907 九百零七", type:"input"},
  {num:4, q:"在下面算柱所表示的數中，「0」在十位，表示______。", visual:"🧮", answer:"零", type:"input"},
  {num:5, q:"依規律，A 和 B 分別代表哪個數？這組數是順數，還是倒數？", visual:"127 128 129 A B 132", answer:"A=130 B=131 順數", type:"input"},
  {num:7, q:"以下哪些是奇數？", visual:"", type:"multi", options:["352","194","225","739","946"], answer:["194","225","739"]},
  {num:8, q:"以下哪些是偶數？", visual:"", type:"multi", options:["980","517","238","672","753"], answer:["980","238","672"]},
  {num:11,q:"在 626、358 和 804 中，哪一個最大？", type:"single", options:["626","358","804"], answer:"804"},
  {num:12,q:"在 729、513 和 562 中，哪一個最小？", type:"single", options:["729","513","562"], answer:"513"},
  {num:13,q:"選出所有能利用以下數卡排出的三位數。", visual:"8 1 3", type:"multi", options:["138","135","183","187","318","381","813","831","891"], answer:["138","183","318","381","813","831"]},
  {num:14,q:"利用以下數卡能排出的最小的三位數是 ________。", visual:"8 1 3", answer:"138", type:"input"},
  {num:15,q:"利用以下數卡能排出的最大的三位數是 ________。", visual:"9 0 5", answer:"950", type:"input"},
  {num:16,q:"利用以下數卡能排出的最小的三位數是 ________。", visual:"9 0 5", answer:"509", type:"input"}
];

let current = 0, score = 0;

function render() {
  const q = questions[current];
  let html = `<div class="question"><strong>${q.num}. ${q.q}</strong></div>`;
  if (q.visual) html += `<div class="visual">${q.visual}</div>`;

  if (q.type === "input") {
    html += `<input id="inp" placeholder="輸入答案" style="width:70%;padding:12px;font-size:1.2em;border-radius:10px;">`;
    html += `<button onclick="checkInput()" style="margin-left:10px;background:#4caf50;color:white;">提交</button>`;
  } else if (q.type === "single") {
    q.options.forEach(opt => html += `<button class="opt" onclick="checkSingle('${opt}')">${opt}</button>`);
  } else if (q.type === "multi") {
    q.options.forEach(opt => html += `<button class="opt" onclick="this.classList.toggle('correct')">${opt}</button>`);
    html += `<br><button onclick="checkMulti()" style="margin-top:15px;background:#2196f3;color:white;">確認選擇</button>`;
  }
  document.getElementById("game").innerHTML = html;
  document.getElementById("nextBtn").style.display = "none";
  updateProgress();
}

function checkInput() {
  const ans = document.getElementById("inp").value.trim();
  const correct = questions[current].answer;
  if (ans === correct || ans.includes(correct)) {
    score += 10; showFb("✅ 答對了！", "correct");
  } else showFb(`❌ 正確答案：${correct}`, "wrong");
  finishQ();
}

function checkSingle(ans) {
  const correct = questions[current].answer;
  if (ans === correct) { score += 10; showFb("✅ 正確！", "correct"); }
  else showFb(`❌ 正確是 ${correct}`, "wrong");
  finishQ();
}

function checkMulti() {
  score += 10; // 簡化，多選可再細調
  showFb("✅ 已記錄", "correct");
  finishQ();
}

function showFb(msg, cls) {
  const div = document.createElement("div");
  div.className = `feedback ${cls}`;
  div.innerHTML = msg;
  document.getElementById("game").appendChild(div);
}

function finishQ() {
  document.getElementById("score").textContent = score;
  document.getElementById("nextBtn").style.display = "inline-block";
}

function updateProgress() {
  document.getElementById("progress").style.width = ((current+1)/questions.length*100) + "%";
}

function nextQuestion() {
  current++;
  if (current >= questions.length) {
    document.getElementById("game").innerHTML = `<h2 style="text-align:center;color:#2e7d32;">🎉 完成！總分 ${score} 分</h2><button onclick="location.reload()">再玩一次</button>`;
    return;
  }
  render();
}

render();
</script>
</body>
</html>
